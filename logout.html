<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3f51b5">
<title>Logout - MEVTENCIA</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow: hidden;
}

/* Animated Background Circles */
.bg-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
}

.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    animation: float 20s infinite;
}

.circle:nth-child(1) {
    width: 80px;
    height: 80px;
    top: 10%;
    left: 20%;
    animation-delay: 0s;
}

.circle:nth-child(2) {
    width: 120px;
    height: 120px;
    top: 60%;
    left: 80%;
    animation-delay: 2s;
}

.circle:nth-child(3) {
    width: 100px;
    height: 100px;
    top: 80%;
    left: 10%;
    animation-delay: 4s;
}

.circle:nth-child(4) {
    width: 60px;
    height: 60px;
    top: 30%;
    left: 70%;
    animation-delay: 6s;
}

@keyframes float {
    0%, 100% {
        transform: translateY(0) translateX(0);
    }
    33% {
        transform: translateY(-30px) translateX(20px);
    }
    66% {
        transform: translateY(20px) translateX(-20px);
    }
}

/* Main Container */
.logout-container {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 60px 50px;
    text-align: center;
    max-width: 500px;
    width: 100%;
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Logout Icon */
.logout-icon {
    width: 120px;
    height: 120px;
    margin: 0 auto 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    50% {
        transform: scale(1.05);
        box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }
}

.logout-icon svg {
    width: 60px;
    height: 60px;
    stroke: white;
    stroke-width: 2;
    fill: none;
}

/* Text Content */
.logout-container h1 {
    color: #333;
    font-size: 32px;
    margin-bottom: 15px;
    font-weight: 700;
}

.logout-container p {
    color: #666;
    font-size: 16px;
    margin-bottom: 10px;
    line-height: 1.6;
}

.logout-container .subtitle {
    color: #999;
    font-size: 14px;
    margin-bottom: 40px;
}

/* Buttons */
.button-group {
    display: flex;
    gap: 15px;
    margin-top: 30px;
}

.btn {
    flex: 1;
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    min-height: 44px;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
}

.btn-secondary {
    background: white;
    color: #667eea;
    border: 2px solid #667eea;
}

.btn-secondary:hover {
    background: #f8f9ff;
    transform: translateY(-2px);
}

/* Loading Animation */
.loading {
    display: none;
    margin: 20px auto;
}

.loading.active {
    display: block;
}

.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Success Message */
.success-message {
    display: none;
    color: #4caf50;
    font-weight: 600;
    margin-top: 20px;
    animation: fadeIn 0.5s ease-out;
}

.success-message.active {
    display: block;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

/* Company Info */
.company-info {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid #eee;
}

.company-info h3 {
    color: #3f51b5;
    font-size: 20px;
    margin-bottom: 10px;
}

.company-info p {
    color: #999;
    font-size: 13px;
}

/* Responsive */
@media (max-width: 600px) {
    .logout-container {
        padding: 40px 30px;
    }

    .logout-container h1 {
        font-size: 26px;
    }

    .button-group {
        flex-direction: column;
    }

    .logout-icon {
        width: 100px;
        height: 100px;
    }

    .logout-icon svg {
        width: 50px;
        height: 50px;
    }
}
</style>
</head>
<body>

<!-- Background Animation -->
<div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<!-- Logout Container -->
<div class="logout-container">
    <div class="logout-icon">
        <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
    </div>

    <h1>Come Back Soon! 👋</h1>
    <p>You have been successfully logged out.</p>
    <p class="subtitle">Thank you for using MEVTENCIA Admin Panel</p>

    <div class="loading" id="loadingSpinner">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #667eea;">Logging out...</p>
    </div>

    <div class="success-message" id="successMessage">
        ✓ Successfully logged out!
    </div>

    <div class="button-group">
        <a href="employeeProfile.html" class="btn btn-primary">Employee Login</a>
        <a href="adminLogin.html" class="btn btn-secondary">Admin Login</a>
        <a href="index.html" class="btn btn-secondary">Home</a>
    </div>

    <div class="company-info">
        
        <h3>Mevrick Solution Private Limited</h3>
        <p>Secure Employee Management System</p>
    </div>
</div>

<script>
// PWA Service Worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

// Logout: clear session only (keep databases)
window.addEventListener('load', function() {
  const loadingSpinner = document.getElementById('loadingSpinner');
  const successMessage = document.getElementById('successMessage');

  loadingSpinner.classList.add('active');

  setTimeout(() => {
    try {
      localStorage.removeItem("mevtencia_session");
      // Optional: keep photo/location so employee can reuse; comment out if you want to clear
      // localStorage.removeItem("employeePhoto");
      // localStorage.removeItem("employeeLocationDetails");
      // localStorage.removeItem("mevtencia_lastCaptureAt");
    } catch {}

    loadingSpinner.classList.remove('active');
    successMessage.classList.add('active');
  }, 900);
});
</script>

</body>
</html>
