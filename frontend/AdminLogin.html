<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3f51b5">
    <title>MEVTENCIA Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }
        .navbar {
            background: rgba(255,255,255,0.96); backdrop-filter: blur(10px);
            padding: 16px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 6px 24px rgba(0,0,0,0.10); position: sticky; top: 0; z-index: 10;
        }
        .logo { color: #111827; font-size: 18px; font-weight: 800; }
        .nav-links { display: flex; gap: 12px; list-style: none; }
        .nav-links a {
            color: #3f51b5; text-decoration: none; font-size: 13px; font-weight: 700;
            padding: 10px; border-radius: 12px; transition: background 0.12s;
        }
        .nav-links a:hover { background: rgba(63,81,181,0.08); }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-wrapper { text-align: center; width: 100%; max-width: 450px; }
        .header-section { margin-bottom: 40px; }
        .admin-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #3f51b5, #2c3e9e);
            border-radius: 18px; display: inline-flex; align-items: center;
            justify-content: center; margin-bottom: 20px;
            box-shadow: 0 12px 26px rgba(63,81,181,0.25);
        }
        .admin-icon svg { width: 35px; height: 35px; fill: white; }
        .title    { font-size: 32px; color: rgba(255,255,255,0.98); margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.92); font-size: 14px; }
        .login-card {
            background: white; border-radius: 18px; padding: 22px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid rgba(17,24,39,0.06);
        }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: #999; }
        .form-control {
            width: 100%; padding: 14px 15px 14px 45px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 15px; transition: all 0.3s; outline: none; min-height: 44px;
        }
        .form-control:focus { border-color: #5c6bc0; box-shadow: 0 0 0 3px rgba(92,107,192,0.1); }
        .form-control::placeholder { color: #aaa; }
        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%);
            color: white; border: none; border-radius: 12px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 44px;
        }
        .login-btn:hover { box-shadow: 0 14px 28px rgba(63,81,181,0.30); }
        .login-btn:active { transform: scale(0.99); }
        .footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.90); font-size: 12px; }
        .version { color: #999; font-size: 12px; margin-top: 5px; }
        .msg { margin-top: 12px; padding: 12px; border-radius: 12px; font-size: 13px; display: none; }
        .msg.show { display: block; animation: pop .18s ease-out; }
        @keyframes pop { from { transform: translateY(-6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">MEVTENCIA</a></div>
        <ul class="nav-links">
            <li><a href="mev.html">Employee</a></li>
            <li><a href="reg.html">Registration</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="login-wrapper">
            <div class="header-section">
                <div class="admin-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <h1 class="title">MEVTENCIA <span>Admin</span></h1>
                <p class="subtitle">Secure Access to Admin Management System</p>
            </div>

            <div class="login-card">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="adminId">Admin ID</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                            <input type="text" id="adminId" class="form-control"
                                   placeholder="Enter Admin ID" required autocomplete="username" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                            <input type="password" id="password" class="form-control"
                                   placeholder="••••••••" required autocomplete="current-password" />
                        </div>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                            <path d="M10 17l5-5-5-5v10z"/>
                        </svg>
                        Secure Login
                    </button>
                </form>

                <div class="msg error"   id="msgErr"></div>
                <div class="msg success" id="msgOk"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div>© 2026 MEVTENCIA</div>
        <div class="version">PWA • Admin Access</div>
    </footer>

 <script>
const LS_CREDS = "mevtencia_adminCreds";

function getAdminCreds() {
    const existing = localStorage.getItem(LS_CREDS);
    if (existing) {
        try { return JSON.parse(existing); } catch {}
    }
    const defaults = { id: "Sehenaz", password: "6556" };
    localStorage.setItem(LS_CREDS, JSON.stringify(defaults));
    return defaults;
}

function showMsg(el, text) { el.textContent = text; el.classList.add("show"); }
function hideMsg(el) { el.classList.remove("show"); el.textContent = ""; }

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const msgErr = document.getElementById("msgErr");
    const msgOk  = document.getElementById("msgOk");
    hideMsg(msgErr);
    hideMsg(msgOk);

    const adminId  = document.getElementById("adminId").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!adminId || !password) {
        showMsg(msgErr, "⚠️ Please fill in all fields.");
        return;
    }

    const creds = getAdminCreds();

    if (adminId === creds.id && password === creds.password) {

        localStorage.setItem("mevtencia_session", JSON.stringify({
            type: "admin",
            id: adminId,
            loginAt: new Date().toISOString()
        }));

        showMsg(msgOk, "✅ Login successful! Redirecting...");

        setTimeout(function () {
            window.location.href = "adminControlPanel.html";
        }, 800);

    } else {
        showMsg(msgErr, "❌ Invalid Admin ID or Password.");
    }
});
</script>
</body>
</html>
