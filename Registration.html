<!DOCTYPE html>
<html>
<head>
    <title>Mevrick Appointment Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:30px;
        }
        .box{
            background:white;
            padding:30px;
            max-width:600px;
            margin:auto;
            border-radius:10px;
        }
        input,select{
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }
        button{
            padding:12px;
            background:#4a5bdc;
            color:white;
            border:none;
            cursor:pointer;
            width:100%;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Appointment Letter Generator</h2>

    <input type="text" id="name" placeholder="Employee Name">
    <input type="text" id="designation" placeholder="Designation">
    <input type="number" id="salary" placeholder="Monthly Salary">
    <input type="date" id="joiningDate">

    <select id="type">
        <option value="Full Time">Full Time</option>
        <option value="Casual">Casual / Contractual</option>
    </select>

    <input type="text" id="location" placeholder="Work Location">

    <button onclick="generatePDF()">Generate Appointment Letter</button>
</div>

<script>

async function generatePDF(){

    try {

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF("p","mm","a4");

        // Get values safely
        const name = document.getElementById("name")?.value.trim();
        const designation = document.getElementById("designation")?.value.trim();
        const salaryValue = document.getElementById("salary")?.value;
        const joiningDate = document.getElementById("joiningDate")?.value;
        const type = document.getElementById("type")?.value;
        const location = document.getElementById("location")?.value.trim();

        // Validation
        if(!name || !designation || !salaryValue || !joiningDate || !location){
            alert("Please fill all fields properly.");
            return;
        }

        const salary = parseInt(salaryValue);
        if(isNaN(salary) || salary <= 0){
            alert("Enter valid salary.");
            return;
        }

        const annual = salary * 12;

        // Background Image Load Safe
        const img = new Image();
        img.src = "letterhead.png";

        await new Promise((resolve,reject)=>{
            img.onload = resolve;
            img.onerror = reject;
        }).catch(()=>{
            alert("Background image (letterhead.png) not found.");
        });

        function addBackground(){
            doc.addImage(img,'PNG',0,0,210,297);
        }

        function checkPage(y){
            if(y > 270){
                doc.addPage();
                addBackground();
                return 40;
            }
            return y;
        }

        addBackground();
        let y = 40;

        doc.setFontSize(11);
        doc.text(`Employee ID: MEV/${Math.floor(Math.random()*900+100)}/2025`,15,y);
        y+=6;
        doc.text(`Date: ${new Date().toLocaleDateString('en-GB')}`,15,y);
        y+=12;

        doc.setFont(undefined,"bold");
        doc.text(`Subject: Appointment Letter for the Position of ${designation}`,15,y);
        y+=10;

        doc.setFont(undefined,"normal");
        doc.text(`Dear ${name},`,15,y);
        y+=8;

        let intro = type==="Full Time"
            ? `We are pleased to appoint you to the position of ${designation} with Mevrick Solutions Private Limited on a Full-Time basis under the terms and conditions set forth in this letter.`
            : `We are pleased to offer you the position of ${designation} with Mevrick Solutions Private Limited on a contractual target basis under the terms and conditions set forth in this letter.`;

        let lines = doc.splitTextToSize(intro,180);
        lines.forEach(line=>{
            y = checkPage(y);
            doc.text(line,15,y);
            y+=6;
        });

        y+=8;

        doc.setFont(undefined,"bold");
        doc.text("1. Joining Date & Reporting",15,y);
        y+=8;
        doc.setFont(undefined,"normal");

        doc.text(`Your joining date will be ${new Date(joiningDate).toDateString()}.`,15,y);
        y+=6;
        doc.text(`Your posting will be at ${location}.`,15,y);
        y+=10;

        doc.setFont(undefined,"bold");
        doc.text("2. Compensation",15,y);
        y+=8;
        doc.setFont(undefined,"normal");

        if(type==="Full Time"){
            doc.text(`Your annual Gross CTC will be ₹ ${annual.toLocaleString('en-IN')}.`,15,y);
        }else{
            doc.text(`You will receive a fixed monthly salary of ₹ ${salary.toLocaleString('en-IN')}.`,15,y);
        }

        y+=20;

        doc.text("Sincerely,",15,y);
        y+=6;
        doc.text("Authorized Signatory",15,y);

        doc.save(`${name}_Appointment_Letter.pdf`);

    } catch(error){
        console.error(error);
        alert("Something went wrong. Check console.");
    }
}

</script>
</body>
</html>
